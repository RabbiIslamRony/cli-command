  php_deps: "none"

structure:
  entry_point: ".claude/commands/"
  commands_dir: ".claude/commands/"
  total_commands: 16
  commands:
    context: "context.md — Project context extractor"
    plan: "plan.md — Feature implementation planner"
    design: "design.md — Figma/image to pixel-perfect code"
    git-gen: "git-gen.md — Commit, branch, PR generator"
    pr-gen: "pr-gen.md — PR title + description generator"
    ship: "ship.md — Full git workflow (stage, format, commit, push, PR)"
    push: "push.md — Quick commit & push"
    review: "review.md — Code quality, security, UX review"
    check: "check.md — Pre-merge PASS/FAIL validation"
    simplify: "simplify.md — Code reuse and efficiency optimizer"
    refactor: "refactor.md — Code smell detection & modernization"
    perf: "perf.md — Performance audit & quick wins"
    bugfix: "bugfix.md — Full bug fix lifecycle"
    debug: "debug.md — Root cause analysis"
    build: "build.md — Build system diagnostics & optimization"
    release: "release.md — Version bump, changelog, release process"
  reference_guides:
    - "git-aliases.md — Git aliases for everyday shortcuts"
    - "github-commands.md — Comprehensive GitHub CLI & Git reference"
  config_files:
    - ".claude/settings.json — Global permissions"
    - ".claude/settings.local.json — Local user permissions (gitignored)"

workflow:
  main_branch: "main"
  branch_strategy: "single main branch"
  commit_style: "casual imperative — short lowercase messages (e.g., 'update style', 'agent update')"
  build_command: "none"
  watch_command: "none"
  deploy: "github-clone-copy"
  ci_cd: "none"
  distribution: "Users clone repo and copy .claude/commands/ to their project or ~/.claude/commands/"

conventions:
  file_naming: "kebab-case for command files (e.g., git-gen.md, pr-gen.md)"
  documentation_language: "English"
  command_pattern: |
    Each command follows a 5-step pattern:
    1. Load context — read .claude/context.yaml if available
    2. Gather requirements — ask via AskUserQuestion
    3. Parallel analysis — launch multiple agents simultaneously
    4. Generate output — synthesize findings
    5. Execute with approval — apply changes after user confirmation

platform:
  os: "Windows 11"
  shell: "bash (Git Bash)"
  git_config:
    autocrlf: true
    ignorecase: true
    filemode: false

notes: |
  - This is a prompt/command library, not a compiled application
  - Commands are language-agnostic — designed to work with any tech stack
  - Primary use case is WordPress plugin development (directorist) but commands are generic
  - No build dependencies, no package managers, no CI/CD
  - settings.local.json is gitignored to keep user-specific permissions private
